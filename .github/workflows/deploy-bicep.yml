name: Deploy Bicep

on:
  workflow_dispatch:
  push:
    branches:
    - main
    paths:
    - .azure/**
    - .github/workflows/deploy-bicep.yml

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy resource group template
      uses: azure/cli@v2
      with:
        azcliversion: latest
        inlineScript: |
          RG_NAME="${{ vars.AZURE_RESOURCE_GROUP }}"
          RG_LOCATION="${{ vars.AZURE_LOCATION }}"
          SHARED_RG_NAME="${{ vars.SHARED_AZURE_RESOURCE_GROUP }}"

          if [ -z "$RG_NAME" ]; then
            echo "Error: Repository variable AZURE_RESOURCE_GROUP is not set." >&2
            exit 1
          fi

          if [ -z "$RG_LOCATION" ]; then
            echo "Error: Repository variable AZURE_LOCATION is not set." >&2
            exit 1
          fi

          if [ -z "$SHARED_RG_NAME" ]; then
            echo "Error: Repository variable SHARED_AZURE_RESOURCE_GROUP is not set." >&2
            exit 1
          fi

          if [ ! -f ".azure/main.bicep" ]; then
            echo "Error: .azure/main.bicep was not found." >&2
            exit 1
          fi

          echo "Deploying to resource group: $RG_NAME in location: $RG_LOCATION"
          echo "Using shared Cosmos resources from: $SHARED_RG_NAME"

          az group create --name "$RG_NAME" --location "$RG_LOCATION"
          az deployment group create \
            --resource-group "$RG_NAME" \
            --template-file .azure/main.bicep \
            --parameters name="$RG_NAME" shared_name="$SHARED_RG_NAME" staticWebAppLocation="$RG_LOCATION"
