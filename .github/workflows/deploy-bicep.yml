name: Deploy Bicep

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group name
        required: false
        default: ichi
      location:
        description: Azure region for the resource group
        required: false
        default: westeurope
  push:
    branches:
    - main
    paths:
    - .azure/**
    - .github/workflows/deploy-bicep.yml

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy resource group template
      uses: azure/cli@v2
      with:
        azcliversion: latest
        inlineScript: |
          RG_NAME="${{ github.event.inputs.resource_group }}"
          RG_LOCATION="${{ github.event.inputs.location }}"

          if [ -z "$RG_NAME" ]; then
            RG_NAME="${{ vars.AZURE_RESOURCE_GROUP }}"
          fi
          if [ -z "$RG_NAME" ]; then
            RG_NAME="ichi"
          fi

          if [ -z "$RG_LOCATION" ]; then
            RG_LOCATION="${{ vars.AZURE_LOCATION }}"
          fi
          if [ -z "$RG_LOCATION" ]; then
            RG_LOCATION="westeurope"
          fi

          echo "Deploying to resource group: $RG_NAME in location: $RG_LOCATION"

          az group create --name "$RG_NAME" --location "$RG_LOCATION"
          az deployment group create \
            --resource-group "$RG_NAME" \
            --parameters .azure/main.bicepparam
